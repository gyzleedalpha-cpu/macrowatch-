<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacroWatch</title>
<style>
:root {
  --bg: #050709;
  --surface: #0b0f16;
  --card: #101520;
  --border: #1c2535;
  --accent: #00d4ff;
  --red: #ff4d6d;
  --green: #39ff14;
  --orange: #ff9500;
  --fed: #4a9eff;
  --boj: #ff6b6b;
  --snb: #e63946;
  --trump: #ff9500;
  --muted: #3a4a5c;
  --text: #ccd8e8;
  --dim: #56707f;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo { font-size: 22px; font-weight: 900; letter-spacing: 3px; color: var(--accent); }
.logo span { color: var(--red); }
.live { display: flex; align-items: center; gap: 8px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.clock { font-family: monospace; font-size: 11px; color: var(--dim); }

/* TICKER */
.ticker { overflow: hidden; height: 26px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.ticker-inner { display: flex; gap: 32px; animation: tick 30s linear infinite; white-space: nowrap; padding: 5px 0; }
@keyframes tick { from{transform:translateX(100vw)} to{transform:translateX(-200%)} }
.ti { font-family: monospace; font-size: 10px; color: var(--green); flex-shrink: 0; }
.ti.dn { color: var(--red); }

/* LAYOUT */
.main { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
}
.sb-title { font-family: monospace; font-size: 9px; letter-spacing: 3px; color: var(--muted); padding: 14px 16px 6px; text-transform: uppercase; }
.sb-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; background: none; border: none;
  cursor: pointer; color: var(--dim); font-size: 13px;
  text-align: left; width: 100%; transition: all .15s;
  position: relative;
}
.sb-btn:hover { background: rgba(255,255,255,.04); color: var(--text); }
.sb-btn.active { color: var(--text); background: rgba(255,255,255,.04); }
.sb-btn.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:0 2px 2px 0; }
.sb-btn[data-s="all"].active::before  { background:var(--accent); }
.sb-btn[data-s="fed"].active::before  { background:var(--fed); }
.sb-btn[data-s="boj"].active::before  { background:var(--boj); }
.sb-btn[data-s="snb"].active::before  { background:var(--snb); }
.sb-btn[data-s="trump"].active::before{ background:var(--trump); }
.sb-btn[data-s="markets"].active::before{ background:var(--green); }
.sb-btn[data-s="twitter"].active::before{ background:#1da1f2; }
.sb-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.d-all{background:var(--accent)} .d-fed{background:var(--fed)} .d-boj{background:var(--boj)}
.d-snb{background:var(--snb)} .d-trump{background:var(--trump)} .d-markets{background:var(--green)} .d-twitter{background:#1da1f2}
.badge { margin-left:auto; font-family:monospace; font-size:10px; background:var(--border); color:var(--dim); padding:2px 6px; border-radius:3px; }

/* CONTENT */
.content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.content-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.feed-title { font-size: 16px; font-weight: 700; letter-spacing: 2px; color: var(--accent); }
.refresh-btn {
  display: flex; align-items: center; gap: 8px;
  background: rgba(0,212,255,.08); border: 1px solid rgba(0,212,255,.25);
  color: var(--accent); padding: 7px 16px; border-radius: 6px;
  cursor: pointer; font-family: monospace; font-size: 11px; letter-spacing: 1px;
  transition: all .2s;
}
.refresh-btn:hover { background: rgba(0,212,255,.15); }
.refresh-btn:disabled { opacity:.4; cursor:not-allowed; }

/* FEED */
.feed { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:10px; }
.feed::-webkit-scrollbar { width:4px; }
.feed::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* AI PANEL */
.ai-panel {
  background: linear-gradient(135deg,rgba(0,212,255,.07),rgba(57,255,20,.04));
  border: 1px solid rgba(0,212,255,.2); border-radius: 8px; padding: 14px;
}
.ai-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.ai-label { font-family:monospace; font-size:9px; letter-spacing:2px; color:var(--accent); text-transform:uppercase; }
.ai-body { font-size:13px; line-height:1.7; color:var(--text); }

/* DIVIDER */
.divider { font-family:monospace; font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; display:flex; align-items:center; gap:10px; margin:4px 0; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }

/* CARD */
.card {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px; animation: fadeIn .3s ease both;
}
.card:hover { border-color: var(--muted); background: #131a24; }
@keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
.card-top { display:flex; align-items:center; gap:8px; margin-bottom:9px; flex-wrap:wrap; }
.tag { font-family:monospace; font-size:9px; letter-spacing:1.5px; font-weight:700; padding:3px 8px; border-radius:4px; text-transform:uppercase; }
.tag-fed    { background:rgba(74,158,255,.15); color:var(--fed); border:1px solid rgba(74,158,255,.3); }
.tag-boj    { background:rgba(255,107,107,.15); color:var(--boj); border:1px solid rgba(255,107,107,.3); }
.tag-snb    { background:rgba(230,57,70,.15);  color:var(--snb); border:1px solid rgba(230,57,70,.3); }
.tag-trump  { background:rgba(255,149,0,.15);  color:var(--trump); border:1px solid rgba(255,149,0,.3); }
.tag-markets{ background:rgba(57,255,20,.1);   color:var(--green); border:1px solid rgba(57,255,20,.25); }
.tag-twitter{ background:rgba(29,161,242,.12); color:#1da1f2; border:1px solid rgba(29,161,242,.25); }
.imp { font-family:monospace; font-size:9px; padding:3px 7px; border-radius:4px; letter-spacing:1px; }
.imp-high { background:rgba(255,77,109,.15); color:var(--red); border:1px solid rgba(255,77,109,.3); }
.imp-med  { background:rgba(255,149,0,.12); color:var(--orange); border:1px solid rgba(255,149,0,.25); }
.imp-low  { background:rgba(60,70,90,.2); color:var(--dim); border:1px solid var(--border); }
.ctime { font-family:monospace; font-size:10px; color:var(--dim); margin-left:auto; }
.ctitle { font-size:14px; font-weight:600; line-height:1.4; margin-bottom:6px; }
.csumm  { font-size:12px; color:var(--dim); line-height:1.6; }
.cfoot  { display:flex; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
.sent   { font-family:monospace; font-size:10px; margin-left:auto; }
.s-h{color:var(--red)} .s-d{color:var(--fed)} .s-n{color:var(--dim)} .s-b{color:var(--green)} .s-be{color:var(--red)}

/* LOADING / ERROR */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:60px; }
.ring { width:36px; height:36px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin{to{transform:rotate(360deg)}}
.ltext { font-family:monospace; font-size:11px; color:var(--dim); letter-spacing:2px; }
.err-box { background:rgba(255,77,109,.08); border:1px solid rgba(255,77,109,.3); border-radius:8px; padding:16px; }
.err-title { color:var(--red); font-family:monospace; font-size:12px; font-weight:700; margin-bottom:8px; }
.err-msg { font-size:12px; color:var(--text); line-height:1.6; word-break:break-all; background:rgba(0,0,0,.3); padding:8px; border-radius:6px; font-family:monospace; white-space:pre-wrap; }
.retry-btn { margin-top:12px; padding:8px 20px; background:rgba(0,212,255,.1); border:1px solid rgba(0,212,255,.3); border-radius:6px; color:var(--accent); font-family:monospace; font-size:11px; cursor:pointer; }

/* RESPONSIVE */
@media(max-width:700px){
  .sidebar{display:none;}
  .mobile-tabs{display:flex!important;}
}
.mobile-tabs{display:none;gap:6px;overflow-x:auto;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);scrollbar-width:none;}
.mobile-tabs::-webkit-scrollbar{display:none;}
.mtab{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--dim);font-size:11px;font-family:monospace;cursor:pointer;}
.mtab.active{background:var(--accent);color:#000;border-color:transparent;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">MACRO<span>WATCH</span></div>
  <div class="live">
    <div class="dot"></div>
    <div class="clock" id="clk">--:-- UTC</div>
  </div>
</div>

<div class="ticker">
  <div class="ticker-inner">
    <span class="ti">FED 3.50-3.75%</span><span class="ti">BOJ 0.75%</span>
    <span class="ti">EUR/USD 1.0842</span><span class="ti">USD/JPY 149.87</span>
    <span class="ti">USD/CHF 0.9023</span><span class="ti">10Y UST 4.31%</span>
    <span class="ti dn">WTI $100/b</span><span class="ti">ORO $2,184</span>
    <span class="ti dn">S&amp;P500 -0.4%</span><span class="ti">BTC $67,420</span>
  </div>
</div>

<!-- Mobile tabs -->
<div class="mobile-tabs" id="mobileTabs">
  <button class="mtab active" data-s="all">TODO</button>
  <button class="mtab" data-s="fed">FED</button>
  <button class="mtab" data-s="boj">BOJ</button>
  <button class="mtab" data-s="snb">SNB</button>
  <button class="mtab" data-s="trump">TRUMP</button>
  <button class="mtab" data-s="markets">MERCADOS</button>
  <button class="mtab" data-s="twitter">ANALISTAS</button>
</div>

<div class="main">
  <aside class="sidebar">
    <div class="sb-title">Fuentes</div>
    <button class="sb-btn active" data-s="all"><span class="sb-dot d-all"></span>Todo el mercado<span class="badge" id="b-all">0</span></button>
    <button class="sb-btn" data-s="fed"><span class="sb-dot d-fed"></span>Reserva Federal<span class="badge" id="b-fed">0</span></button>
    <button class="sb-btn" data-s="boj"><span class="sb-dot d-boj"></span>Banco de Japón<span class="badge" id="b-boj">0</span></button>
    <button class="sb-btn" data-s="snb"><span class="sb-dot d-snb"></span>Banco Nacional Suizo<span class="badge" id="b-snb">0</span></button>
    <button class="sb-btn" data-s="trump"><span class="sb-dot d-trump"></span>Trump / TruthSocial<span class="badge" id="b-trump">0</span></button>
    <button class="sb-btn" data-s="markets"><span class="sb-dot d-markets"></span>Mercados Globales<span class="badge" id="b-markets">0</span></button>
    <button class="sb-btn" data-s="twitter"><span class="sb-dot d-twitter"></span>Economistas / X<span class="badge" id="b-twitter">0</span></button>
  </aside>

  <div class="content">
    <div class="content-top">
      <div class="feed-title" id="feedTitle">INTELIGENCIA MACRO GLOBAL</div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadNews()">
        <span id="refreshIcon">↺</span> ACTUALIZAR
      </button>
    </div>
    <div class="feed" id="feed">
      <div class="loading"><div class="ring"></div><div class="ltext">CONECTANDO CON MERCADOS...</div></div>
    </div>
  </div>
</div>

<script>
const TITLES = {all:"INTELIGENCIA MACRO GLOBAL",fed:"RESERVA FEDERAL",boj:"BANCO DE JAPÓN",snb:"BANCO NACIONAL SUIZO",trump:"TRUMP / TRUTH SOCIAL",markets:"MERCADOS GLOBALES",twitter:"ECONOMISTAS EN X"};
const TAG_N  = {fed:"FED",boj:"BOJ",snb:"SNB",trump:"TRUMP",markets:"MERCADOS",twitter:"X"};
const SENT_L = {hawkish:"↑ HAWKISH",dovish:"↓ DOVISH",neutral:"→ NEUTRAL",bullish:"▲ ALCISTA",bearish:"▼ BAJISTA"};
const SENT_C = {hawkish:"s-h",dovish:"s-d",neutral:"s-n",bullish:"s-b",bearish:"s-be"};
let active = "all";
let allNews = [];
let busy = false;

// Clock
setInterval(()=>{ document.getElementById("clk").textContent = new Date().toUTCString().split(" ")[4]+" UTC"; },1000);

// Sidebar buttons
document.querySelectorAll(".sb-btn,[data-s]").forEach(btn=>{
  btn.addEventListener("click",()=>{
    const s = btn.dataset.s;
    if(!s||busy) return;
    document.querySelectorAll(".sb-btn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".mtab").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(`[data-s="${s}"]`).forEach(b=>b.classList.add("active"));
    active = s;
    document.getElementById("feedTitle").textContent = TITLES[s]||"NOTICIAS";
    loadNews();
  });
});

function getPrompt(s){
  const d = new Date().toLocaleDateString("es-ES");
  const fmt = `\nResponde SOLO con JSON puro. Sin texto antes ni después. Sin markdown. Empieza con {.\nFormato: {"news":[{"id":"1","source":"fed","title":"...","summary":"...","impact":"high","sentiment":"hawkish","time":"hace 5 min"}]}\nsource: fed|boj|snb|trump|markets|twitter | impact: high|med|low | sentiment: hawkish|dovish|neutral|bullish|bearish`;
  const m={
    all:`Genera 12 noticias macroeconómicas para ${d}, fuentes variadas (fed,boj,snb,trump,markets,twitter).${fmt}`,
    fed:`Genera 7 noticias de la Reserva Federal para ${d}: Powell, FOMC, tasas, inflación, empleo.${fmt}`,
    boj:`Genera 6 noticias del Banco de Japón para ${d}: Ueda, yen, tasas, YCC, política monetaria.${fmt}`,
    snb:`Genera 5 noticias del Banco Nacional Suizo para ${d}: Jordan, CHF, tasas, reservas.${fmt}`,
    trump:`Genera 6 posts económicos de Trump para ${d}: aranceles, China, Fed, dólar, manufact. Tono directo.${fmt}`,
    markets:`Genera 8 noticias de mercados para ${d}: S&P500, bonos, oro, petróleo, crypto, datos macro.${fmt}`,
    twitter:`Genera 7 tweets de economistas para ${d}: El-Erian, Summers, Roubini, Lyn Alden, Goldman. Título "@handle: tweet".${fmt}`
  };
  return m[s]||m.all;
}

function extractNews(text){
  const fns=[
    ()=>JSON.parse(text.trim()),
    ()=>JSON.parse((text.match(/\{[\s\S]*\}/)||[""])[0]),
    ()=>JSON.parse((text.match(/\[[\s\S]*\]/)||[""])[0]),
    ()=>JSON.parse(text.replace(/```json|```/gi,"").trim()),
  ];
  for(const fn of fns){
    try{
      const r=fn();
      if(r&&Array.isArray(r.news)&&r.news.length) return r.news;
      if(Array.isArray(r)&&r.length) return r;
    }catch{}
  }
  return null;
}

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

async function callAPI(prompt){
  const controller = new AbortController();
  const tid = setTimeout(()=>controller.abort(), 35000);
  try{
    const res = await fetch("/api/chat",{
      signal: controller.signal,
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:4000,
        system:"Responde ÚNICAMENTE con JSON válido. Sin texto extra. Sin markdown. Solo el objeto JSON. Cerrá siempre todos los corchetes.",
        messages:[{role:"user",content:prompt}]
      })
    });
    clearTimeout(tid);
    if(!res.ok){ const t=await res.text(); throw new Error("Error "+res.status+": "+t.slice(0,300)); }
    const data = await res.json();
    if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));
    const text = (data.content||[]).map(b=>b.text||"").join("");
    if(!text) throw new Error("Respuesta vacía del servidor");
    const news = extractNews(text);
    if(!news) throw new Error("JSON inválido recibido:\n"+text.slice(0,400));
    return news;
  }catch(e){
    clearTimeout(tid);
    if(e.name==="AbortError") throw new Error("Tiempo agotado (35s). Reintentá.");
    throw e;
  }
}

async function genSummary(news){
  const el = document.getElementById("aisum");
  if(!el) return;
  const titles = news.slice(0,7).map(n=>`[${n.source}] ${n.title}`).join("\n");
  try{
    const res = await fetch("/api/chat",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,
        messages:[{role:"user",content:`Basado en:\n${titles}\n\nEscribe 2-3 frases de análisis macro ejecutivo. Tono del mercado hoy, eventos clave, impacto esperado. Directo y profesional.`}]
      })
    });
    const d = await res.json();
    el.textContent = (d.content||[]).map(b=>b.text||"").join("")||"Resumen no disponible.";
  }catch{ el.textContent = "Resumen no disponible."; }
}

function updateBadges(news){
  const srcs = ["fed","boj","snb","trump","markets","twitter"];
  document.getElementById("b-all").textContent = news.length;
  srcs.forEach(s=>{
    const el = document.getElementById(`b-${s}`);
    if(el) el.textContent = news.filter(n=>n.source===s).length;
  });
}

function renderFiltered(){
  const news = active==="all" ? allNews : allNews.filter(n=>n.source===active);
  renderNews(news);
}

function renderNews(news){
  const feed = document.getElementById("feed");
  if(!news||!news.length){
    feed.innerHTML='<div class="err-box"><div class="err-title">Sin resultados</div></div>';
    return;
  }
  const grp={high:[],med:[],low:[]};
  news.forEach(n=>{ const k=n.impact||"low"; (grp[k]||grp.low).push(n); });

  let h = `<div class="ai-panel">
    <div class="ai-header"><div class="dot"></div><div class="ai-label">Análisis IA — Resumen ejecutivo</div></div>
    <div class="ai-body" id="aisum" style="color:var(--dim);font-size:12px;">Analizando ${news.length} eventos...</div>
  </div>`;

  const SEC={high:"IMPACTO ALTO",med:"IMPACTO MEDIO",low:"IMPACTO BAJO"};
  let ci=0;
  ["high","med","low"].forEach(imp=>{
    if(!grp[imp].length) return;
    h+=`<div class="divider">${SEC[imp]}</div>`;
    grp[imp].forEach((n,i)=>{
      const src=["fed","boj","snb","trump","markets","twitter"].includes(n.source)?n.source:"markets";
      h+=`<div class="card" style="animation-delay:${ci*.04}s">
<div class="card-top">
  <span class="tag tag-${src}">${TAG_N[src]}</span>
  <span class="imp imp-${imp}">${imp==="high"?"ALTO":imp==="med"?"MEDIO":"BAJO"}</span>
  <span class="ctime">${esc(n.time||"ahora")}</span>
</div>
<div class="ctitle">${esc(n.title)}</div>
<div class="csumm">${esc(n.summary)}</div>
<div class="cfoot"><span class="sent ${SENT_C[n.sentiment]||"s-n"}">${SENT_L[n.sentiment]||"→ NEUTRAL"}</span></div>
</div>`;
      ci++;
    });
  });
  feed.innerHTML=h;
  genSummary(news);
}

function showError(msg){
  document.getElementById("feed").innerHTML=`<div class="err-box">
<div class="err-title">⚠ Error al cargar noticias</div>
<div class="err-msg">${esc(msg)}</div>
<button class="retry-btn" onclick="loadNews()">↺ Reintentar</button>
</div>`;
}

async function loadNews(){
  if(busy) return;
  busy=true;
  const btn=document.getElementById("refreshBtn");
  const icon=document.getElementById("refreshIcon");
  btn.disabled=true;
  icon.style.animation="spin .5s linear infinite";
  document.getElementById("feed").innerHTML='<div class="loading"><div class="ring"></div><div class="ltext">CARGANDO NOTICIAS...</div></div>';
  try{
    const news = await callAPI(getPrompt(active));
    allNews = news;
    updateBadges(news);
    renderFiltered();
  }catch(e){
    showError(e.message||String(e));
  }
  busy=false;
  btn.disabled=false;
  icon.style.animation="";
}

loadNews();
setInterval(()=>{ if(active==="all"&&!busy) loadNews(); },300000);
</script>
</body>
</html>
